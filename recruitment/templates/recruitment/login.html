{% extends 'recruitment/base.html' %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-8 border border-gray-200 rounded-lg shadow">
    <h2 class="text-2xl font-bold mb-6 text-gray-900 text-center">Iniciar Sessão</h2>
    <form method="post">
        {% csrf_token %}
        <div class="mb-4">
            <label class="block mb-2 text-sm font-medium text-gray-900">Nome de utilizador</label>
            <input type="text" name="username" required>
        </div>
        <div class="mb-4">
            <label class="block mb-2 text-sm font-medium text-gray-900">Palavra-passe</label>
            <input type="password" name="password" required>
        </div>
        {% if form.errors %}
            <p class="text-red-500 text-sm mb-4">Nome do utilizador ou palavra-passe incorrectos.</p>
        {% endif %}
        <button type="submit" class="w-full text-white bg-blue-700 hover:bg-blue-800 font-medium rounded-lg text-sm px-5 py-2.5 text-center">Entrar</button>
    </form>
    <div class="text-sm font-medium text-gray-500 mt-4 text-center">
        Ainda não tem conta? <a href="{% url 'signup' %}" class="text-blue-700 hover:underline">Registe-se aqui</a>
    </div>
</div>
{% endblock %}
