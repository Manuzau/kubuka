{% extends 'recruitment/base.html' %}

{% block title %}Palavra-passe Alterada — KUBUKA{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4 py-12">
    <div class="bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden">
        <div style="background:#3BBFAD;height:3px;"></div>
        <div class="p-8 text-center">
            <div class="w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4" style="background:#D1FAE5;">
                <svg class="w-8 h-8" style="color:#3BBFAD;" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
            </div>
            <h2 class="text-lg font-bold text-gray-800 mb-2">Palavra-passe alterada!</h2>
            <p class="text-sm text-gray-500 mb-6">A sua palavra-passe foi redefinida com sucesso. Pode agora iniciar sessão.</p>
            <a href="{% url 'login' %}" class="inline-block px-5 py-2.5 rounded-lg text-sm font-semibold text-white" style="background:#1B6CA8;">
                Iniciar Sessão
            </a>
        </div>
    </div>
</div>
{% endblock %}
