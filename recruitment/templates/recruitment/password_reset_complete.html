{% extends 'recruitment/base.html' %}
{% block title %}Palavra-passe Alterada — KUBUKA{% endblock %}
{% block content %}
<div class="max-w-md mx-auto px-6 py-16">
    <div class="glass-card p-8 text-center animate-fadeInUp">

        <div class="w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-5"
            style="background:linear-gradient(135deg,rgba(16,185,129,0.3),rgba(6,182,212,0.2));border:1px solid rgba(16,185,129,0.3);box-shadow:0 0 30px rgba(16,185,129,0.2);">
            <svg class="w-8 h-8" style="color:#6EE7B7;" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
        </div>

        <h2 class="text-xl font-bold text-white mb-2">Palavra-passe alterada!</h2>
        <p class="text-sm mb-8 leading-relaxed" style="color:rgba(241,245,249,0.5);">A sua palavra-passe foi redefinida com sucesso. Pode agora iniciar sessão.</p>

        <a href="{% url 'login' %}" class="btn-primary inline-block px-6 py-2.5 rounded-xl text-sm font-bold">
            Iniciar Sessão
        </a>
    </div>
</div>
{% endblock %}
